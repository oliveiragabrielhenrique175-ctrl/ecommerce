<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercearia | G&M Store</title>

<link rel="stylesheet" href="mercearia.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header class="topo">

    <a href="index.html" class="voltar">
        <i class="fa-solid fa-arrow-left"></i>
        Voltar
    </a>

    <h1>Mercearia</h1>

</header>

<section class="banner">

    <h2>Produtos de Mercearia</h2>

    <p>
        Encontre arroz, feijão, macarrão,
        açúcar e muito mais.
    </p>

</section>

<section class="produtos">

    <div class="produto">

        <img src="img/img/Arozzz.sem fundo da mercearia.png">
        <h3>Arroz Tipo 1</h3>
        <span>R$ 24,90</span>
        <button>Comprar</button>

    </div>

    <div class="produto">

        <img src="img/img/feijão.sem fundo da merceaei.png">
        <h3>Feijão Carioca</h3>
        <span>R$ 8,90</span>
        <button>Comprar</button>

    </div>

    <div class="produto">

        <img src="img/img/macarrao.sem fundo.png">
        <h3>Macarrão</h3>
        <span>R$ 5,90</span>
        <button>Comprar</button>

    </div>

    <div class="produto">

        <img src="img/img/açucar.sem fundo.png">
        <h3>Açúcar</h3>
        <span>R$ 6,50</span>
        <button>Comprar</button>

    </div>
</section>
</body>
</html>
